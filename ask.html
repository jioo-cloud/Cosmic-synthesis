<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATHA PINDE TATHA BRAHMANDE — Ask a Question</title>
    <style>
        /* DESIGN SYSTEM VARIABLES (MATCHED TO MAIN SYSTEM) */
        :root {
            --bg-deep: #06080c;
            --card-bg: rgba(11, 17, 26, 0.85);
            --accent-gold: #d4af37;
            --accent-cyan: #00f3ff;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 243, 255, 0.25);
            --input-bg: rgba(6, 8, 12, 0.7);
        }

        /* RESET & BASE MATRIX */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* DEEP SPACE BACKGROUND CANVAS */
        .cosmic-nebula {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(157, 78, 221, 0.07) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(0, 243, 255, 0.05) 0%, transparent 45%);
            z-index: -2;
        }

        /* CUSTOM CSS STARFIELD PARTICLE SYSTEM */
        .starfield-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: cosmic-fade infinite ease-in-out;
        }

        .star.s1 { width: 1px; height: 1px; animation-duration: 4s; }
        .star.s2 { width: 2px; height: 2px; animation-duration: 6s; background-color: var(--accent-cyan); }
        .star.s3 { width: 3px; height: 3px; animation-duration: 8s; background-color: var(--accent-gold); }

        @keyframes cosmic-fade {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }

        /* HEADER MATRIX */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            color: var(--accent-gold);
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
            margin-bottom: 12px;
            font-weight: 800;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--accent-cyan);
            font-style: italic;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }

        .nav-back-btn {
            display: inline-block;
            background: rgba(6, 8, 12, 0.6);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-back-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        /* STRUCTURE CONTAINER */
        .main-container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 20px 120px;
        }

        /* FORM COMPONENT ARCHITECTURE */
        .form-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.55);
            backdrop-filter: blur(10px);
            transition: border-color 0.4s ease;
        }

        .form-card:hover {
            border-color: var(--border-glow);
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            background-color: rgba(6, 8, 12, 0.9);
        }

        select option {
            background-color: var(--bg-deep);
            color: var(--text-main);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-deep);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.35);
        }

        /* REPOSITORY PROTOCOL FOOTER */
        footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(4, 6, 9, 0.4);
            backdrop-filter: blur(10px);
            margin-top: 60px;
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }
    </style>
</head>
